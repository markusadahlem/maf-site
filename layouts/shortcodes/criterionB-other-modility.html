<div id="otherCheckContainer">
    <p>
        <strong>{{ i18n "flow.criterionBOther.question" }}</strong>
    </p>
    <button class="btn" onclick="handleOtherCheck(true)">{{ i18n "flow.criterionBOther.button.yes" }}</button>
    <button class="btn btn-outline" onclick="handleOtherCheck(false)">
        {{ i18n "flow.criterionBOther.button.no" }}
    </button>

    <div id="followUpResponse" style="margin-top: 1rem"></div>
</div>

<script>
    const OTHER_CHECK_MSGS = {
        similar: {{ i18n "flow.criterionBOther.result.similar" | jsonify | safeJS }},
        notSimilar: {{ i18n "flow.criterionBOther.result.notSimilar" | jsonify | safeJS }},
        buttonContinue: {{ i18n "flow.criterionBOther.button.continue" | jsonify | safeJS }},
        buttonContinueAnyway: {{ i18n "flow.criterionBOther.button.continueAnyway" | jsonify | safeJS }},
    };
    const OTHER_CHECK_URL = {{ relLangURL "/aura-symptom-check/aura-characteristics/" | jsonify | safeJS }};

    function handleOtherCheck(isSimilar) {
        // Save user's answer for PDF later
        localStorage.setItem(
            "otherSymptomIsSimilar",
            JSON.stringify(isSimilar),
        );

        const output = document.getElementById("followUpResponse");

        if (isSimilar) {
            output.innerHTML = `
        ${OTHER_CHECK_MSGS.similar}
        <br><br>
        <a href="${OTHER_CHECK_URL}" class="btn">${OTHER_CHECK_MSGS.buttonContinue}</a>
      `;
        } else {
            output.innerHTML = `
        ${OTHER_CHECK_MSGS.notSimilar}
        <br><br>
        <a href="${OTHER_CHECK_URL}" class="btn btn-outline">${OTHER_CHECK_MSGS.buttonContinueAnyway}</a>
      `;
        }
    }
</script>
