<button class="btn" onclick="handleOtherCheck(true)">{{ i18n "flow.criterionBOther.button.yes" }}</button>
<button class="btn btn-outline" onclick="handleOtherCheck(false)">{{ i18n "flow.criterionBOther.button.no" }}</button>

<div id="followUpResponse" style="margin-top: 1rem"></div>

<style>
    .btn {
        display: inline-block;
        margin: 0.1rem 0.5rem 0 0;
        padding: 0.2rem 1.2rem;
        font-size: 1rem;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        text-decoration: none;
    }
    .btn-outline {
        background-color: transparent;
        border: 2px solid #007bff;
        color: #007bff;
    }
    .btn:hover,
    .btn-outline:hover {
        background-color: #0056b3;
        color: white;
    }
</style>

<script>
    const PLUS_OTHER_MSGS = {
        similar: {{ i18n "flow.criterionBOther.result.similar" | jsonify | safeJS }},
        notSimilar: {{ i18n "flow.criterionBPlusOther.result.notSimilar" | jsonify | safeJS }},
        buttonContinue: {{ i18n "flow.criterionBOther.button.continue" | jsonify | safeJS }},
        buttonGoToReport: {{ i18n "flow.criterionBPlusOther.button.goToReport" | jsonify | safeJS }},
    };
    const PLUS_OTHER_URLS = {
        continue: {{ relLangURL "/aura-symptom-check/aura-characteristics/" | jsonify | safeJS }},
        report: {{ relLangURL "/aura-symptom-check/symptom-check-preliminary-plus-report/" | jsonify | safeJS }},
    };

    function handleOtherCheck(isSimilar) {
        const output = document.getElementById("followUpResponse");

        if (isSimilar) {
            output.innerHTML = `
                ${PLUS_OTHER_MSGS.similar}
                <br><br>
                <a href="${PLUS_OTHER_URLS.continue}" class="btn">${PLUS_OTHER_MSGS.buttonContinue}</a>
            `;
        } else {
            output.innerHTML = `
                ${PLUS_OTHER_MSGS.notSimilar}
                <br><br>
                <a href="${PLUS_OTHER_URLS.report}" class="btn btn-outline">${PLUS_OTHER_MSGS.buttonGoToReport}</a>
            `;
        }
    }
</script>
