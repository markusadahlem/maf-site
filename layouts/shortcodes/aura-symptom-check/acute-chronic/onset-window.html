<form id="onsetWindowForm">
    <fieldset>
        <label id="optionC1">
            <input type="radio" name="onsetWindow" value="acute-chronic-C1" />
            {{ i18n "flow.acuteChronic.onsetWindow.c1" }} </label
        ><br />

        <label>
            <input type="radio" name="onsetWindow" value="acute-chronic-C2" />
            {{ i18n "flow.acuteChronic.onsetWindow.c2" }} </label
        ><br />

        <label>
            <input type="radio" name="onsetWindow" value="acute-chronic-C3" />
            {{ i18n "flow.acuteChronic.onsetWindow.c3" }} </label
        ><br />

        <label>
            <input type="radio" name="onsetWindow" value="acute-chronic-C4" />
            {{ i18n "flow.acuteChronic.onsetWindow.c4" }}
        </label>
    </fieldset>

    <br />
    <button type="button" class="btn" id="nextOnsetBtn" style="display: none">
        {{ i18n "flow.common.button.continue" }}
    </button>
    <button
        type="button"
        class="btn btn-secondary"
        id="backBtn"
        style="display: none"
    >
        {{ i18n "flow.common.button.back" }}
    </button>
</form>
