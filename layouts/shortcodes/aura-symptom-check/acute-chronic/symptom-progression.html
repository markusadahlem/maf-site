<form id="symptomProgressionForm">
    <fieldset>
        <label>
            <input
                type="radio"
                name="symptomProgression"
                value="acute-chronic-D1"
            />
            {{ i18n "flow.acuteChronic.symptomProgression.d1" }} </label
        ><br />

        <label>
            <input
                type="radio"
                name="symptomProgression"
                value="acute-chronic-D2"
            />
            {{ i18n "flow.acuteChronic.symptomProgression.d2" }} </label
        ><br />

        <label>
            <input
                type="radio"
                name="symptomProgression"
                value="acute-chronic-D3"
            />
            {{ i18n "flow.acuteChronic.symptomProgression.d3" }}
        </label>
    </fieldset>

    <br />
    <button
        type="button"
        class="btn"
        id="nextProgressionBtn"
        style="display: none"
    >
        {{ i18n "flow.common.button.continue" }}
    </button>
</form>
