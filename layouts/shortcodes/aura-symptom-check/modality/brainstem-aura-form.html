<form id="brainstemAuraForm">
    <fieldset>
        <legend><strong>{{ i18n "flow.modality.brainstem.legend" }}</strong></legend>

        <label
            ><input
                type="checkbox"
                name="brainstemSymptoms"
                value="dysarthria"
            />
            {{ i18n "flow.modality.brainstem.option.dysarthria" }}</label
        ><br />
        <label
            ><input type="checkbox" name="brainstemSymptoms" value="vertigo" />
            {{ i18n "flow.modality.brainstem.option.vertigo" }}</label
        ><br />
        <label
            ><input type="checkbox" name="brainstemSymptoms" value="tinnitus" />
            {{ i18n "flow.modality.brainstem.option.tinnitus" }}</label
        ><br />
        <label
            ><input
                type="checkbox"
                name="brainstemSymptoms"
                value="hypacusis"
            />
            {{ i18n "flow.modality.brainstem.option.hypacusis" }}</label
        ><br />
        <label
            ><input type="checkbox" name="brainstemSymptoms" value="diplopia" />
            {{ i18n "flow.modality.brainstem.option.diplopia" }}</label
        ><br />
        <label
            ><input type="checkbox" name="brainstemSymptoms" value="ataxia" />
            {{ i18n "flow.modality.brainstem.option.ataxia" }}</label
        ><br />
        <label
            ><input
                type="checkbox"
                name="brainstemSymptoms"
                value="consciousness"
            />
            {{ i18n "flow.modality.brainstem.option.consciousness" }}</label
        ><br />
        <label id="brainstemOtherLabel">
            <input type="checkbox" name="brainstemSymptoms" value="other" />
            {{ i18n "flow.modality.brainstem.option.other" }} </label
        ><br /><br />

        <label id="brainstemNoneLabel">
            <input type="checkbox" name="brainstemSymptoms" value="none" />
            {{ i18n "flow.common.option.noneAbove" }} </label
        ><br />

        <label
            id="brainstemOtherTextLabel"
            for="brainstemOtherText"
            style="display: none"
        >
            <strong>{{ i18n "flow.common.label.otherDescribe" }}</strong>
        </label>
        <textarea
            id="brainstemOtherText"
            rows="2"
            maxlength="200"
            placeholder="{{ i18n "flow.common.placeholder.maxChars200" }}"
            style="
                width: 100%;
                border: 1px solid #ccc;
                padding: 6px;
                display: none;
            "
        ></textarea>

        <div
            id="brainstemCharCount"
            style="font-size: 0.9em; color: #555; display: none"
        >
            {{ i18n "flow.common.counter200" }}
        </div>
    </fieldset>

    <br />
    <button type="button" class="btn" id="nextBrainstemBtn">{{ i18n "flow.common.button.continue" }}</button>
</form>
