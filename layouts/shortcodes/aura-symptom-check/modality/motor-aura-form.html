<form id="motorAuraForm">
    <fieldset>
        <legend></legend>
        <label
            ><input type="radio" name="motor-weakness" value="yes" /> {{ i18n "flow.common.option.yes" }}</label
        ><br />
        <label><input type="radio" name="motor-weakness" value="no" /> {{ i18n "flow.common.option.no" }}</label
        ><br />
        <label
            ><input type="radio" name="motor-weakness" value="unsure" />
            {{ i18n "flow.common.option.unsure" }}</label
        >
    </fieldset>

    <div id="motorLocationsSection" style="margin-top: 1rem; display: none">
        <p><strong>{{ i18n "flow.modality.motor.locationsPrompt" }}</strong></p>
        <label
            ><input type="checkbox" name="motor-location" value="Arm or hand" />
            {{ i18n "flow.modality.motor.location.armOrHand" }}</label
        ><br />
        <label
            ><input type="checkbox" name="motor-location" value="Leg or foot" />
            {{ i18n "flow.modality.motor.location.legOrFoot" }}</label
        ><br />
        <label
            ><input type="checkbox" name="motor-location" value="Face" />
            {{ i18n "flow.modality.motor.location.face" }}</label
        ><br />
        <label
            ><input type="checkbox" name="motor-location" value="Other" />
            {{ i18n "flow.modality.motor.location.other" }}</label
        >

        <div style="margin-top: 0.5rem">
            <label id="motorOtherLabel" for="motor-other" style="display: none"
                ><strong>{{ i18n "flow.modality.motor.label.describeOther" }}</strong></label
            >
            <textarea
                id="motor-other"
                rows="2"
                maxlength="80"
                placeholder="{{ i18n "flow.common.placeholder.maxChars80" }}"
                style="
                    width: 100%;
                    border: 1px solid #ccc;
                    padding: 6px;
                    display: none;
                "
            ></textarea>
            <div
                id="motorCharCount"
                style="font-size: 0.9em; color: #555; display: none"
            >
                {{ i18n "flow.common.counter80" }}
            </div>
        </div>
    </div>

    <br />
    <button type="button" class="btn" id="continueBtn" style="display: none">
        {{ i18n "flow.common.button.continue" }}
    </button>
</form>
