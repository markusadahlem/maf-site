<form id="sensoryAuraForm">
    <fieldset>
        <label
            ><input type="checkbox" name="sensorySymptom" value="tingling" />
            {{ i18n "flow.modality.sensory.option.tingling" }}</label
        ><br />
        <label
            ><input type="checkbox" name="sensorySymptom" value="numbness" />
            {{ i18n "flow.modality.sensory.option.numbness" }}</label
        ><br />
        <label
            ><input type="checkbox" name="sensorySymptom" value="burning" />
            {{ i18n "flow.modality.sensory.option.burning" }}</label
        ><br />
        <label
            ><input type="checkbox" name="sensorySymptom" value="other" />
            {{ i18n "flow.modality.sensory.option.other" }}</label
        ><br />
    </fieldset>

    <br />

    <label id="sensoryOtherLabel" for="sensoryOtherText"
        ><strong>{{ i18n "flow.common.label.otherDescribe" }}</strong></label
    >
    <textarea
        id="sensoryOtherText"
        rows="2"
        maxlength="200"
        placeholder="{{ i18n "flow.common.placeholder.maxChars200" }}"
        style="width: 100%; border: 1px solid #ccc; padding: 6px"
    ></textarea>

    <!-- Counter is hidden by default -->
    <div
        id="sensoryCharCount"
        style="font-size: 0.9em; color: #555; display: none"
    >
        {{ i18n "flow.common.counter200" }}
    </div>
    <br />
    <label
        ><input type="checkbox" name="sensorySymptom" value="none" />
        {{ i18n "flow.common.option.noneAbove" }}</label
    ><br />
    <br /><br />

    <button type="button" class="btn" id="nextSensoryBtn">{{ i18n "flow.common.button.continue" }}</button>
</form>
