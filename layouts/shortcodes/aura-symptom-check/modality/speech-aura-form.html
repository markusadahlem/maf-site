<form id="speechAuraForm">
    <fieldset>
        <label>
            <input type="checkbox" name="speechSymptom" value="aphasia" />
            {{ i18n "flow.modality.speech.option.aphasia" }} </label
        ><br />

        <label>
            <input type="checkbox" name="speechSymptom" value="slurred" />
            {{ i18n "flow.modality.speech.option.slurred" }} </label
        ><br />

        <label>
            <input type="checkbox" name="speechSymptom" value="inability" />
            {{ i18n "flow.modality.speech.option.inability" }} </label
        ><br />

        <label id="speechOtherLabel">
            <input type="checkbox" name="speechSymptom" value="other" />
            {{ i18n "flow.modality.speech.option.other" }} </label
        ><br /><br />

        <label id="speechNoneLabel">
            <input type="checkbox" name="speechSymptom" value="none" />
            {{ i18n "flow.common.option.noneAbove" }} </label
        ><br />
    </fieldset>

    <label for="speechOtherText" id="speechTextLabel" style="display: none">
        <strong>{{ i18n "flow.common.label.otherDescribe" }}</strong>
    </label>
    <textarea
        id="speechOtherText"
        rows="2"
        maxlength="200"
        placeholder="{{ i18n "flow.common.placeholder.maxChars200" }}"
        style="width: 100%; border: 1px solid #ccc; padding: 6px; display: none"
    ></textarea>

    <div
        id="speechCharCount"
        style="font-size: 0.9em; color: #555; display: none"
    >
        {{ i18n "flow.common.counter200" }}
    </div>

    <br /><br />
    <button type="button" class="btn" id="nextSpeechBtn">{{ i18n "flow.common.button.continue" }}</button>
</form>
