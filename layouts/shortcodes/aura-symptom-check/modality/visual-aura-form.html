<form id="visualAuraForm">
    <fieldset>
        <br />

        <label
            ><input type="checkbox" name="visualSymptom" value="flicker" />
            {{ i18n "flow.modality.visual.option.flicker" }}</label
        ><br />

        <label
            ><input type="checkbox" name="visualSymptom" value="zigzag" />
            {{ i18n "flow.modality.visual.option.zigzag" }}</label
        ><br />

        <label
            ><input type="checkbox" name="visualSymptom" value="blurred" />
            {{ i18n "flow.modality.visual.option.blurred" }}</label
        ><br />

        <label
            ><input type="checkbox" name="visualSymptom" value="scotoma" />
            {{ i18n "flow.modality.visual.option.scotoma" }}</label
        ><br />

        <label
            ><input type="checkbox" name="visualSymptom" value="geometric" />
            {{ i18n "flow.modality.visual.option.geometric" }}</label
        ><br />
        <label
            ><input type="checkbox" name="visualSymptom" value="other" />
            {{ i18n "flow.modality.visual.option.other" }}</label
        ><br />

        <div id="visualOtherWrapper" style="display: none">
            <br />
            <label id="svisualOtherLabel" for="visualOtherText"
                ><strong>{{ i18n "flow.common.label.otherDescribe" }}</strong></label
            ><br />
            <textarea
                id="visualOtherText"
                rows="2"
                maxlength="80"
                placeholder="{{ i18n "flow.common.placeholder.maxChars80" }}"
                style="width: 100%; border: 1px solid #ccc; padding: 6px"
            ></textarea>

            <div
                id="visualCharCount"
                style="font-size: 0.9em; color: #555; display: none"
            >
                {{ i18n "flow.common.counter80" }}
            </div>
        </div>

        <br />

        <label>
            <input
                type="checkbox"
                name="visualSymptom"
                value="none"
                id="visualNoneCheckbox"
            />
            {{ i18n "flow.modality.visual.option.none" }}
        </label>
    </fieldset>

    <br />
    <button type="button" class="btn" id="nextVisualBtn">{{ i18n "flow.common.button.continue" }}</button>
</form>
