# Astro app CI — builds and tests the app/ project.
#
# Runs on pushes to main and on PRs that touch app/**. This is CI-ONLY (build +
# test); publishing to GitHub Pages is handled by deploy.yml.
name: Astro app CI

on:
  push:
    branches: ["main"]
    paths: ["app/**", ".github/workflows/astro-ci.yml"]
  pull_request:
    paths: ["app/**"]
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
