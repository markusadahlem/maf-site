# Criterion C quiz (criterionC.js)
flow.criterionC.q1.text: "Did at least one aura symptom spread gradually over at least 5 minutes?"
flow.criterionC.q1.explanation: "E.g., a flickering spot in your visual field that slowly expands."
flow.criterionC.q2.text: "Did two or more aura symptoms occur in succession?"
flow.criterionC.q2.explanation: "E.g., visual aura followed by tingling."
flow.criterionC.q3.text: "Did each individual aura symptom last between 5–60 minutes?"
flow.criterionC.q3.explanation: "Shorter or longer durations are less typical."
flow.criterionC.q4.text: "Was at least one aura symptom unilateral (on one side only)?"
flow.criterionC.q4.explanation: "E.g., vision affected in only one eye, or tingling only on one side."
flow.criterionC.q5.text: "Was at least one aura symptom positive (e.g., flashing lights or pins and needles)?"
flow.criterionC.q5.explanation: "Positive means an added sensation (not loss of function)."
flow.criterionC.q6.text: "Was the aura accompanied or followed within 60 minutes by headache?"
flow.criterionC.q6.explanation: "Timing matters — headache should be within 1 hour of aura."
