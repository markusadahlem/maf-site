baseURL: https://www.migraine-aura-foundation.org/
languageCode: en-us
title: Migraine Aura Foundation

module:
  imports:
    - path: github.com/imfing/hextra

author:
  name: Migraine Aura Foundation
  email: dahlem@migraine-aura-foundation.org

menu:
  main:
    - identifier: home
      name: Home
      pageRef: /
      weight: 1
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 2
    - identifier: about
      name: About us
      pageRef: /about
      weight: 4
    - identifier: voices
      name: Voices
      pageRef: /voices
      weight: 5
    - identifier: con
    - identifier: contact
      name: Contact
      pageRef: /contact
      weight: 6
    - identifier: search
      name: Search
      weight: 7
      params:
        type: search
    - identifier: impressum
      name: Impressum
      pageRef: /impressum
      weight: 8
    - identifier: language-switch
      weight: 9
      params:
        type: language-switch
        label: true

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      link: /
      width: 20
      height: 20
  footer:
    displayCopyright: true
    displayPoweredBy: false
    width: normal
  posthog:
    projectKey: "phc_pwLBxvza4A7TWXJrbJGx6cFY5nzPg77yH8TiaJdoou75"
    apiHost: "https://eu.i.posthog.com"

defaultContentLanguage: en
# fr/es/it/uk/ru/nl/da content files stay on disk but are excluded from
# the build. Re-enable by removing entries from this list when translations
# are ready.
disableLanguages:
  - fr
  - es
  - it
  - uk
  - ru
  - nl
  - da
languages:
  en:
    languageName: English
    weight: 1
  de:
    languageName: Deutsch
    weight: 2
  fr:
    languageName: Français
    weight: 3
  es:
    languageName: Español
    weight: 4
  it:
    languageName: Italiano
    weight: 5
  uk:
    languageName: Українська
    weight: 6
  ru:
    languageName: Русский
    weight: 7
  nl:
    languageName: Nederlands
    weight: 8
  da:
    languageName: Dansk
    weight: 9

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
