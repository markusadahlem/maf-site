# Field Guide info popovers on motor-aura location options
flow.modality.motor.info.armOrHand: "Schwäche oder Schwere in Arm oder Hand auf einer Seite — du kannst sie zwar bewegen, aber sie fühlt sich „tot“ oder schwerfällig an. Oft Teil einer hemiplegischen Migräne, bei der eine ganze Körperhälfte während der Aura an Kraft verliert."
flow.modality.motor.info.legOrFoot: "Schwäche oder Schwere in Bein oder Fuß auf einer Seite — der Gang wird unsicher oder das Bein zieht nach. Oft Teil einer hemiplegischen Migräne, bei der eine ganze Körperhälfte während der Aura an Kraft verliert."
flow.modality.motor.info.face: "Eine Gesichtshälfte hängt herab oder verliert an Kraft, manchmal so, dass Lächeln oder deutliches Sprechen schwerfällt. Eine seltene Variante, gelegentlich als faszioplegische Migräne bezeichnet."
flow.modality.motor.info.other: "Jede andere motorische Schwäche während deiner Aura — z. B. Schwäche, die sich auf beide Seiten ausdehnt, isolierte Zungen‑ oder Kieferschwäche, oder Schwäche, die nicht zu den oben genannten Mustern passt."

# Modality forms — brainstem aura
flow.modality.brainstem.legend: "Hirnstammsymptome"
flow.modality.brainstem.option.dysarthria: "Verwaschene Sprache (Dysarthrie)"
flow.modality.brainstem.option.vertigo: "Schwindel (Drehgefühl, Vertigo)"
flow.modality.brainstem.option.tinnitus: "Tinnitus (Ohrgeräusche)"
flow.modality.brainstem.option.hypacusis: "Hörminderung (Hypakusis)"
flow.modality.brainstem.option.diplopia: "Doppeltsehen (Diplopie)"
flow.modality.brainstem.option.ataxia: "Koordinations‑ oder Gleichgewichtsstörung (Ataxie)"
flow.modality.brainstem.option.consciousness: "Bewusstseinsminderung: (z. B. Schläfrigkeit, Verwirrtheit)"
flow.modality.brainstem.option.other: "Andere ungewöhnliche Symptome"

# Field Guide info popovers on brainstem-aura options
flow.modality.brainstem.info.dysarthria: "Die Sprache klingt verwaschen, undeutlich oder schwer — klinisch Dysarthrie genannt. Typisch für die Basilarisaura (taucht deshalb auch im Sprech‑Aura‑Formular auf, da sich beides überschneidet)."
flow.modality.brainstem.info.vertigo: "Ein echtes Drehgefühl — das Empfinden, dass du selbst oder der Raum rotiert — unterschieden von Benommenheit. Ein Kernsymptom der Basilarisaura, das innerhalb einer Stunde abklingt."
flow.modality.brainstem.info.tinnitus: "Summen, Klingeln oder Rauschen in den Ohren, das nicht wirklich vorhanden ist. Das häufigste auditive Aurasymptom; kommt und geht oft mit der übrigen Aura."
flow.modality.brainstem.info.hypacusis: "Geräusche werden entfernt, gedämpft oder „wie unter Wasser“. Das Hören normalisiert sich, sobald die Aura abklingt."
flow.modality.brainstem.info.diplopia: "Doppeltsehen — du siehst zwei Bilder eines einzelnen Objekts, nebeneinander oder überlagert. Ein Basilarisaura‑Symptom, das mit dem Rest der Aura abklingt."
flow.modality.brainstem.info.ataxia: "Verlust der Koordination oder des Gleichgewichts — Gehen fühlt sich unsicher, betrunken oder „schwebend“ an, auch ohne Schwäche. Ein klassisches Zeichen der Basilarisaura."
flow.modality.brainstem.info.consciousness: "Ein getrübter, schläfriger, vernebelter oder verwirrter Bewusstseinszustand während der Aura — knapp am Ohnmachtsgefühl, aber merklich verminderte Aufmerksamkeit. Selten; wenn neu, ärztlich abklären lassen."
flow.modality.brainstem.info.other: "Jedes andere ungewöhnliche Hirnstamm‑Symptom während deiner Aura, das nicht zu den obigen Optionen passt — z. B. Schluckbeschwerden, vorübergehender Schluckauf oder ein eigentümliches Gefühl der Entfremdung."

