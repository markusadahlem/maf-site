# Criterion C quiz (criterionC.js)
flow.criterionC.q1.text: "Hat sich wenigstens ein Aurasymptom allmählich über ≥5 Minuten hinweg entwickelt?"
flow.criterionC.q1.explanation: "Beispiel: Ein flackernder Fleck im Sichtfeld, der sich langsam ausdehnt."
flow.criterionC.q2.text: "Sind zwei oder mehr Aurasymptome nacheinander aufgetreten?"
flow.criterionC.q2.explanation: "Beispiel: Eine visuelle Aura gefolgt von Kribbeln."
flow.criterionC.q3.text: "Hat jedes einzelne Aurasymptom zwischen 5–60 Minuten gedauert?"
flow.criterionC.q3.explanation: "Kürzere oder längere Dauer ist weniger typisch."
flow.criterionC.q4.text: "War mindestens ein Auraphänomen einseitig (nur auf einer Körper- oder Gesichtshälfte)?"
flow.criterionC.q4.explanation: "Beispiel: Sehstörung nur auf einer Seite des Gesichtsfeldes oder Kribbeln nur auf einer Körperseite."
flow.criterionC.q5.text: "War mindestens ein Auraphänomen positiv (z. B. Lichtblitze oder Kribbeln)?"
flow.criterionC.q5.explanation: "Positiv bedeutet, dass etwas hinzugefügt wird (nicht ein Funktionsverlust, z. B. blinder Fleck oder Taubheit)."
flow.criterionC.q6.text: "Trat die Aura zusammen mit oder innerhalb von 60 Minuten nach dem Kopfschmerz auf?"
flow.criterionC.q6.explanation: "Das Timing ist wichtig – der Kopfschmerz sollte innerhalb einer Stunde nach der Aura einsetzen."
