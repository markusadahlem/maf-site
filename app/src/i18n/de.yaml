# Field Guide info popovers on visual-aura options
flow.common.info.moreInfo: "Mehr Informationen"
flow.common.info.readFullEntry: "Ganzen Eintrag lesen"
flow.modality.visual.info.flicker: "Punktförmige Lichtblitze — wie Fernseh‑Rauschen oder rasches Flimmern — die im Sichtfeld auftauchen. Oft das erste Anzeichen einer visuellen Aura; dauert Sekunden bis Minuten und vergeht wieder."
flow.modality.visual.info.zigzag: "Helle Zickzack- oder Wellenlinien, meist in Bogenform, die sich über 5–20 Minuten vom Sehzentrum nach außen ausdehnen. Auch Fortifikationsspektrum oder Flimmerbogen genannt."
flow.modality.visual.info.blurred: "Das Sehen wird unscharf, schleierhaft oder verengt sich wie ein Tunnelblick. Umrisse bleiben sichtbar, Details fehlen. Geht immer wieder zurück."
flow.modality.visual.info.scotoma: "Ein Bereich des Gesichtsfeldes wird dunkel oder leer — ein blinder Fleck, klein oder groß. Er kann am Rand flimmern. Das Gehirn „füllt“ den fehlenden Bereich oft mit dem Hintergrund auf."
flow.modality.visual.info.geometric: "Gitter, Raster, Kaleidoskopmuster, Spiralen oder konzentrische Ringe legen sich über das Gesehene. Diese Formkonstanten sind typische visuelle Halluzinationen während der Aura."
flow.modality.visual.info.retinal: "Ein einseitiges Ereignis: Das Sehen wird auf nur einem Auge dunkel, leer oder stark gedämpft (das andere Auge sieht normal), und klärt sich innerhalb von etwa 60 Minuten wieder auf. Unterschieden vom beidäugigen Skotom, das das Gesichtsfeld auf beiden Seiten betrifft."
flow.modality.visual.info.other: "Wenn deine visuelle Erfahrung zu keiner der obigen Optionen passt, schau dir die vollständigen Kataloge des Symptom-Leitfadens an — vorübergehende (klingen meist innerhalb von 60 Minuten ab) und persistierende (bleiben länger) visuelle Symptome."
flow.common.info.transitoryVisualLabel: "Vorübergehende visuelle Symptome"
flow.common.info.persistentVisualLabel: "Persistierende visuelle Symptome"
flow.common.info.transitorySpeechLanguageLabel: "Vorübergehende Sprach‑ und Sprechsymptome"
flow.common.info.transitorySomatosensoryLabel: "Vorübergehende somatosensorische Symptome"
flow.common.info.transitoryMotorLabel: "Vorübergehende motorische Symptome"
flow.common.info.transitoryBrainstemLabel: "Vorübergehende Hirnstamm‑/Basilaris‑Symptome"

# Modality forms — sensory aura
flow.modality.sensory.option.tingling: "Kribbeln oder Ameisenlaufen"
flow.modality.sensory.option.numbness: "Taubheitsgefühl oder ein „schweres“ Gefühl in Arm, Hand, Gesicht oder Bein"
flow.modality.sensory.option.burning: "Brennen oder stechende Empfindungen"
flow.modality.sensory.option.other: "Andere sensorische Veränderungen"

# Field Guide info popovers on sensory-aura options
flow.modality.sensory.info.tingling: "Ein kribbelndes, prickelndes Gefühl — wie ein „eingeschlafenes“ Glied — das oft in den Fingern beginnt und sich allmählich den Arm hinaufzieht. Klinisch Parästhesie genannt."
flow.modality.sensory.info.numbness: "Verlust oder Verminderung der Empfindung, manchmal mit einem schweren oder „toten“ Gefühl. Betrifft meist eine Körperhälfte, das Gesicht oder eine Gliedmaße (Hemihypästhesie) und klingt mit der Aura wieder ab."
flow.modality.sensory.info.burning: "Ein warmes, prickelndes oder brennendes Hautgefühl ohne äußere Ursache. Tritt oft zusammen mit Kribbeln oder Taubheit auf und folgt dem gleichen Aura‑Verlauf."
flow.modality.sensory.info.other: "Jede andere somatosensorische Veränderung während deiner Aura — z. B. beidseitiges Kribbeln, vertauschte oder gespiegelte Empfindungen zwischen den Händen oder ungewöhnliche Gefühle an Lippen oder Zunge."

# Modality forms — speech aura
flow.modality.speech.option.aphasia: "Wortfindungsstörungen (Aphasie)"
flow.modality.speech.option.slurred: "Verwaschene oder unverständliche Sprache"
flow.modality.speech.option.inability: "Unfähigkeit zu sprechen oder Sätze zu bilden"
flow.modality.speech.option.other: "Andere Sprach‑ oder Sprechveränderungen"

# Field Guide info popovers on speech-aura options
flow.modality.speech.info.aphasia: "Du weißt, was du sagen willst, kannst aber die Wörter nicht finden, oder die Sätze kommen verdreht heraus. Hören und Verstehen sind ansonsten intakt. Auch expressive Aphasie oder Dysphasie genannt."
flow.modality.speech.info.slurred: "Die Sprache klingt undeutlich, verwaschen oder schwer — wie nach Alkohol — obwohl deine Gedanken klar sind. Klinisch Dysarthrie genannt; typisch für die Basilarisaura."
flow.modality.speech.info.inability: "Vorübergehender Verlust der Fähigkeit, überhaupt zu sprechen (Mutismus). Bei der Aura selten, immer kurz, und klingt mit der Aura vollständig wieder ab."
flow.modality.speech.info.other: "Jede andere Sprach‑ oder Sprechstörung während deiner Aura — z. B. Stottern, Wortverwechslungen (paraphasisch), oder Schwierigkeiten, andere zu verstehen."

